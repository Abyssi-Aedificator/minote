<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1b1e25">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>minote</title>
<style>
  @font-face{
    font-family:'PP Neue Montreal';
    src:url('fonts/PPNeueMontreal-Regular.woff2') format('woff2'),
        url('fonts/PPNeueMontreal-Regular.woff') format('woff');
    font-weight:400;
    font-style:normal;
    font-display:swap;
  }
  @font-face{
    font-family:'PP Neue Montreal';
    src:url('fonts/PPNeueMontreal-Medium.woff2') format('woff2'),
        url('fonts/PPNeueMontreal-Medium.woff') format('woff');
    font-weight:500;
    font-style:normal;
    font-display:swap;
  }
  @font-face{
    font-family:'PP Neue Montreal';
    src:url('fonts/PPNeueMontreal-Bold.woff2') format('woff2'),
        url('fonts/PPNeueMontreal-Bold.woff') format('woff');
    font-weight:700;
    font-style:normal;
    font-display:swap;
  }
  :root{
    --bg:#15171c;
    --panel:#1b1e25;
    --panel-2:#20232b;
    --line:#2c3038;
    --text:#e7e4da;
    --text-dim:#8b8d92;
    --accent:#e8a23a;
    --accent-dim:#5c4a26;
    --danger:#c1502e;
  }
  :root.light{
    --bg:#f5f5f0;
    --panel:#ffffff;
    --panel-2:#f0f0eb;
    --line:#d9d9d2;
    --text:#1a1a18;
    --text-dim:#8c8c82;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'PP Neue Montreal', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  /* top bar */
  .topbar{
    display:flex;
    align-items:center;
    gap:.8rem;
    padding:.7rem 1rem;
    border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  .topbar .logo{
    font-weight:bold;
    letter-spacing:.12em;
    color:var(--accent);
    font-size:1rem;
  }
  .topbar .logo::before{ content:'※ '; color:#e8a23a; }
  .topbar .version{
    color:var(--text-dim);
    font-size:.72rem;
    letter-spacing:.04em;
    border:1px solid var(--line);
    border-radius:3px;
    padding:.15rem .4rem;
  }
  .search-wrap{
    position:relative;
    flex:1;
    max-width:320px;
  }
  .search-wrap input[type="text"]{
    width:100%;
    font-family:inherit;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:.4rem 3rem .4rem .6rem;
    border-radius:3px;
    box-sizing:border-box;
  }
  .search-wrap input[type="text"]:focus{ outline:1px solid var(--accent); }
  .topbar .spacer{ flex:1; }
  .topbar button{
    font-family:inherit;
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-dim);
    padding:.4rem .7rem;
    border-radius:3px;
    cursor:pointer;
    font-size:.82rem;
  }
  .topbar button:hover{ border-color:var(--accent); color:var(--accent); }
  .topbar button.danger:hover{ border-color:var(--danger); color:var(--danger); }
  .topbar .search-clear{
    position:absolute;
    right:4px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:.75rem;
    padding:.15rem .25rem;
    line-height:1;
  }
  .topbar .search-clear:hover{ color:var(--accent); }
  .topbar .search-img{
    position:absolute;
    right:22px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:.68rem;
    padding:.1rem .2rem;
    line-height:1;
    font-family:inherit;
    font-weight:600;
    opacity:.5;
  }
  .topbar .search-img.active{ color:var(--accent); opacity:1; }
  .topbar .search-img:hover{ opacity:1; color:var(--accent); }

  /* layout */
  .layout{
    flex:1;
    display:flex;
    min-height:0;
  }

  /* left: note index */
  .index-panel{
    width:280px;
    flex-shrink:0;
    border-right:1px solid var(--line);
    background:var(--panel);
    overflow-y:auto;
    display:flex;
    flex-direction:column;
  }
  .index-panel .new-row{
    padding:.6rem;
    border-bottom:1px solid var(--line);
  }
  .index-panel .new-row button{
    width:100%;
    font-family:inherit;
    background:var(--accent-dim);
    color:var(--accent);
    border:1px dashed var(--accent);
    padding:.5rem;
    border-radius:3px;
    cursor:pointer;
    font-size:.85rem;
  }
  .index-panel .new-row button:hover{ background:var(--accent); color:#1b1303; }

  .entry{
    display:flex;
    align-items:flex-start;
    gap:.5rem;
    padding:.65rem .8rem;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    position:relative;
  }
  .entry:hover{ background:var(--panel-2); }
  .entry.active{ background:var(--panel-2); border-left:3px solid var(--accent); padding-left:calc(.8rem - 3px); }
  .entry .num{
    color:var(--text-dim);
    font-size:.75rem;
    padding-top:.15rem;
    min-width:1.6em;
  }
  .entry .info{ flex:1; min-width:0; }
  .entry .title{
    font-size:.9rem;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:var(--text);
  }
  .entry.pinned .title::before{ content:'★ '; color:var(--accent); }
  .entry .snippet{
    font-size:.74rem;
    color:var(--text-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .entry .del{
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:.85rem;
    padding:0 .2rem;
  }
  .entry .del:hover{ color:var(--danger); }

  .index-empty{
    padding:2rem 1rem;
    color:var(--text-dim);
    font-size:.85rem;
    text-align:center;
  }

  /* folders */
  .folders-section{
    border-bottom:1px solid var(--line);
  }
  .folders-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:.45rem .8rem .3rem;
    font-size:.68rem;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--text-dim);
  }
  .folders-header button{
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:.85rem;
    padding:0 .2rem;
    line-height:1;
  }
  .folders-header button:hover{ color:var(--accent); }
  .folder-item{
    display:flex;
    align-items:center;
    padding:.28rem .8rem;
    cursor:pointer;
    font-size:.82rem;
    color:var(--text-dim);
    gap:.4rem;
  }
  .folder-item:hover{ background:var(--panel-2); color:var(--text); }
  .folder-item.active{ color:var(--accent); background:var(--panel-2); }
  .folder-item .folder-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .folder-item .folder-del{
    background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:.65rem; padding:0 .15rem; display:none;
  }
  .folder-item:hover .folder-del{ display:inline; }
  .folder-item .folder-del:hover{ color:var(--danger); }
  .folder-rename-input{
    font-family:inherit;
    font-size:.82rem;
    background:var(--panel-2);
    border:1px solid var(--accent);
    color:var(--text);
    padding:.1rem .3rem;
    border-radius:2px;
    width:100%;
    outline:none;
  }
  .folder-select{
    font-family:inherit;
    font-size:.78rem;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text-dim);
    padding:.25rem .4rem;
    border-radius:3px;
    cursor:pointer;
  }
  .folder-select:focus{ outline:1px solid var(--accent); }

  /* view tabs */
  .view-tabs{
    display:flex;
    border-bottom:1px solid var(--line);
  }
  .view-tabs button{
    flex:1;
    font-family:inherit;
    font-size:.72rem;
    padding:.35rem .3rem;
    border:none;
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .view-tabs button:hover{ color:var(--text); }
  .view-tabs button.active{ color:var(--accent); border-bottom-color:var(--accent); }
  .entry.archived .title{ opacity:.55; }
  .entry.archived .snippet{ opacity:.45; }
  .entry.trashed .title{ opacity:.4; text-decoration:line-through; }
  .entry.trashed .snippet{ opacity:.3; }

  /* right: editor */
  .editor-panel{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
    background:var(--bg);
  }
  .editor-header{
    display:flex;
    align-items:center;
    gap:.6rem;
    padding:.8rem 1.2rem;
    border-bottom:1px solid var(--line);
  }
  .editor-header input[type="text"]{
    flex:1;
    font-family:inherit;
    font-weight:500;
    font-size:1.15rem;
    background:transparent;
    border:none;
    color:var(--text);
    padding:.2rem 0;
  }
  .editor-header input[type="text"]:focus{ outline:none; }
  .editor-header .pin-toggle{
    background:none;
    border:1px solid var(--line);
    border-radius:3px;
    color:var(--text-dim);
    padding:.35rem .6rem;
    cursor:pointer;
    font-size:.85rem;
  }
  .editor-header .pin-toggle.on{ color:var(--accent); border-color:var(--accent); }
  .editor-meta{
    padding:.3rem 1.2rem 0;
    color:var(--text-dim);
    font-size:.74rem;
  }
  .editor-tags{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:.35rem;
    padding:.4rem 1.2rem .1rem;
  }
  .tag-pill{
    display:inline-flex;
    align-items:center;
    gap:.25rem;
    font-size:.72rem;
    background:var(--accent-dim);
    color:var(--accent);
    padding:.12rem .5rem;
    border-radius:3px;
  }
  .tag-pill .tag-del{
    cursor:pointer;
    font-size:.65rem;
    opacity:.6;
  }
  .tag-pill .tag-del:hover{ opacity:1; }
  .images-container{
    display:flex;
    flex-wrap:wrap;
    gap:.5rem;
    padding:.5rem 1.2rem 1.2rem;
  }
  .image-wrap{
    position:relative;
    max-width:200px;
  }
  .image-wrap img{
    max-width:100%;
    max-height:150px;
    border-radius:3px;
    display:block;
    background:var(--panel-2);
  }
  .image-del{
    position:absolute;
    top:4px;
    right:4px;
    background:rgba(0,0,0,.6);
    border:none;
    color:#fff;
    cursor:pointer;
    font-size:.65rem;
    width:20px;
    height:20px;
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .15s;
  }
  .image-wrap:hover .image-del{ opacity:1; }
  .image-del:hover{ background:var(--danger); }
  .tag-input{
    font-family:inherit;
    font-size:.78rem;
    background:transparent;
    border:1px dashed var(--line);
    color:var(--text-dim);
    padding:.15rem .4rem;
    border-radius:3px;
    min-width:80px;
    flex:1 1 80px;
  }
  .tag-input:focus{ outline:none; border-color:var(--accent); color:var(--text); }
  .entry .tags-row{
    display:flex;
    flex-wrap:wrap;
    gap:.3rem;
    margin-top:.25rem;
  }
  .entry .tags-row .tag-pill{
    font-size:.65rem;
    padding:.05rem .4rem;
  }
  .body{
    flex:1;
    margin:0;
    padding:1.2rem;
    border:none;
    background:transparent;
    color:var(--text);
    font-family:inherit;
    font-size:.95rem;
    line-height:1.6;
    outline:none;
    overflow-y:auto;
    white-space:pre-wrap;
    word-wrap:break-word;
    cursor:text;
  }
  .body.is-empty::before{
    content:attr(data-placeholder);
    color:var(--text-dim);
    pointer-events:none;
  }
  /* live markdown styling */
  .body .lm-mark{ display:none; color:var(--text-dim); opacity:.65; }
  .body .lm-line.lm-line-active .lm-mark{ display:inline; }
  .body .lm-h1, .body .lm-h2, .body .lm-h3, .body .lm-h4, .body .lm-h5, .body .lm-h6{
    font-weight:600;
    line-height:1.3;
  }
  .body .lm-h1{ font-size:1.45rem; }
  .body .lm-h2{ font-size:1.25rem; }
  .body .lm-h3{ font-size:1.1rem; }
  .body .lm-h4{ font-size:1rem; }
  .body .lm-h5, .body .lm-h6{ font-size:.9rem; color:var(--text-dim); }
  .body code{
    font-family:ui-monospace, 'Cascadia Code', Consolas, monospace;
    font-size:.85em;
    background:var(--panel-2);
    border-radius:3px;
    padding:.08em .3em;
    -webkit-box-decoration-break:clone;
    box-decoration-break:clone;
  }
  .body .lm-code-block{
    display:inline;
    font-family:ui-monospace, 'Cascadia Code', Consolas, monospace;
    font-size:.9em;
    background:var(--panel-2);
    padding:0 1em;
    -webkit-box-decoration-break:clone;
    box-decoration-break:clone;
  }
  .body .lm-fence{
    display:inline-block;
    min-width:2em;
    min-height:1.1em;
    color:var(--text-dim);
  }
  .body .lm-quote{
    display:inline;
    color:var(--text-dim);
    border-left:3px solid var(--accent);
    padding:0 0 0 .7em;
    -webkit-box-decoration-break:clone;
    box-decoration-break:clone;
  }
  .body .lm-hr{
    display:inline-block;
    width:100%;
    min-height:.7em;
    color:var(--text-dim);
    border-bottom:1px solid var(--line);
  }
  .body .lm-bullet, .body .lm-task-box{
    display:inline-block;
    width:1.2em;
  }
  .body .lm-line.lm-line-active .lm-bullet, .body .lm-line.lm-line-active .lm-task-box{ display:none; }
  .body .lm-bullet::before{ content:'•'; }
  .body .lm-task-box::before{ content:'☐'; color:var(--text-dim); }
  .body .lm-task-box.lm-task-checked::before{ content:'☑'; color:var(--accent); }
  .body .lm-ol-mark{ color:var(--text-dim); }
  .body del{ opacity:.6; }
  .body a{ color:var(--accent); }

  /* slash command menu */
  .editor-panel{ position:relative; }
  .slash-menu{
    position:absolute;
    z-index:50;
    min-width:220px;
    max-height:260px;
    overflow-y:auto;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:5px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    scrollbar-width:thin;
    scrollbar-color:var(--line) transparent;
  }
  .slash-menu::-webkit-scrollbar{ width:8px; }
  .slash-menu::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .slash-item{
    display:flex;
    align-items:center;
    gap:.6rem;
    padding:.45rem .7rem;
    cursor:pointer;
    font-size:.82rem;
    color:var(--text);
  }
  .slash-item .slash-icon{
    width:1.6em;
    text-align:center;
    color:var(--text-dim);
    font-family:ui-monospace, Consolas, monospace;
    font-size:.78rem;
    flex-shrink:0;
  }
  .slash-item .slash-hint{
    margin-left:auto;
    color:var(--text-dim);
    font-size:.68rem;
    font-family:ui-monospace, Consolas, monospace;
  }
  .slash-item.active{ background:var(--panel-2); }
  .slash-item.active .slash-icon{ color:var(--accent); }
  .slash-empty{ padding:.5rem .7rem; font-size:.78rem; color:var(--text-dim); }

  .no-selection{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-dim);
    font-size:.9rem;
    text-align:center;
    padding:2rem;
  }

  /* dialog */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .dialog{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:5px;
    padding:1.5rem 1.8rem 1.2rem;
    min-width:280px;
    max-width:380px;
    text-align:center;
  }
  .dialog p{
    margin:0 0 1.2rem;
    font-size:.9rem;
    color:var(--text);
    line-height:1.5;
  }
  .dialog .buttons{
    display:flex;
    gap:.6rem;
    justify-content:center;
  }
  .dialog button{
    font-family:inherit;
    font-size:.82rem;
    padding:.45rem 1rem;
    border-radius:3px;
    cursor:pointer;
    border:1px solid var(--line);
    background:transparent;
    color:var(--text-dim);
    min-width:70px;
  }
  .dialog button:hover{ border-color:var(--accent); color:var(--accent); }
  .dialog button.primary{
    background:var(--accent-dim);
    border-color:var(--accent);
    color:var(--accent);
  }
  .dialog button.primary:hover{ background:var(--accent); color:#1b1303; }
  .dialog button.danger{
    border-color:var(--danger);
    color:var(--danger);
  }
  .dialog button.danger:hover{ background:var(--danger); color:#fff; }

  .changelog-panel{
    position:relative;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:5px;
    padding:1.8rem 2rem;
    width:520px;
    max-width:calc(100vw - 2.4rem);
    height:min(80vh, 700px);
    display:flex;
    flex-direction:column;
  }
  .changelog-panel .changelog-scroll{
    flex:1;
    overflow-y:auto;
    margin:0 -2rem;
    padding:0 2rem;
  }

  /* themed scrollbars */
  .changelog-scroll, .settings-scroll, .index-panel{
    scrollbar-width:thin;
    scrollbar-color:var(--line) transparent;
  }
  .changelog-scroll::-webkit-scrollbar, .settings-scroll::-webkit-scrollbar, .index-panel::-webkit-scrollbar{
    width:8px;
  }
  .changelog-scroll::-webkit-scrollbar-track, .settings-scroll::-webkit-scrollbar-track, .index-panel::-webkit-scrollbar-track{
    background:transparent;
  }
  .changelog-scroll::-webkit-scrollbar-thumb, .settings-scroll::-webkit-scrollbar-thumb, .index-panel::-webkit-scrollbar-thumb{
    background:var(--line);
    border-radius:4px;
  }
  .changelog-scroll::-webkit-scrollbar-thumb:hover, .settings-scroll::-webkit-scrollbar-thumb:hover, .index-panel::-webkit-scrollbar-thumb:hover{
    background:var(--accent-dim);
  }
  .changelog-panel h2{
    margin:0 0 1rem;
    font-size:1rem;
    font-weight:600;
    color:var(--text);
    letter-spacing:.04em;
  }
  .changelog-panel .version-label{
    font-size:.85rem;
    font-weight:600;
    color:var(--accent);
    margin:1.2rem 0 .6rem;
    padding-bottom:.3rem;
    border-bottom:1px solid var(--line);
  }
  .changelog-panel .version-label:first-of-type{ margin-top:0; }
  .changelog-panel h3{
    margin:.8rem 0 .35rem;
    font-size:.74rem;
    font-weight:600;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.08em;
  }
  .changelog-panel ul{
    margin:0 0 .6rem;
    padding-left:1.2rem;
    color:var(--text-dim);
    font-size:.82rem;
    line-height:1.6;
  }
  .changelog-panel ul li{ margin-bottom:.2rem; }
  .changelog-panel .close-btn{
    position:absolute;
    top:.7rem;
    right:.8rem;
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:.85rem;
    padding:.1rem .25rem;
    line-height:1;
  }
  .changelog-panel .close-btn:hover{ color:var(--accent); }

  .settings-panel{
    position:relative;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:1.5rem 1.6rem 1.6rem;
    width:420px;
    max-width:calc(100vw - 2.4rem);
    max-height:min(94vh, 920px);
    display:flex;
    flex-direction:column;
  }
  .settings-panel h2{
    margin:0 0 1.1rem;
    font-size:1.02rem;
    font-weight:600;
    color:var(--text);
    letter-spacing:.02em;
  }
  .settings-scroll{
    overflow-y:auto;
    margin:0 -1.6rem;
    padding:0 1.6rem;
  }
  .settings-card{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:6px;
    padding:1rem 1.1rem 1.1rem;
    margin-bottom:1rem;
  }
  .settings-card:last-child{ margin-bottom:0; }
  .settings-card h3{
    margin:0 0 .85rem;
    font-size:.74rem;
    font-weight:600;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.08em;
    display:flex;
    align-items:center;
  }
  .settings-panel label{
    display:block;
    font-size:.72rem;
    color:var(--text-dim);
    margin-bottom:.45rem;
    text-transform:uppercase;
    letter-spacing:.06em;
  }
  .settings-card .settings-hint{
    font-size:.78rem;
    color:var(--text-dim);
    line-height:1.5;
    margin:0 0 .8rem;
  }
  .theme-row + label{ margin-top:1rem; }
  .color-grid{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:.45rem;
  }
  .color-swatch{
    aspect-ratio:1;
    border-radius:50%;
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .12s;
  }
  .color-swatch:hover{ transform:scale(1.12); }
  .color-swatch.active{ border-color:var(--text); box-shadow:0 0 0 2px var(--panel-2); }
  .theme-row{ display:flex; gap:.5rem; }
  .theme-btn{
    font-family:inherit;
    font-size:.8rem;
    padding:.4rem .8rem;
    border-radius:4px;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text-dim);
    flex:1;
  }
  .theme-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .theme-btn.active{ background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
  .settings-actions{
    display:flex;
    gap:.5rem;
  }
  .settings-actions button{
    font-family:inherit;
    font-size:.8rem;
    padding:.4rem .7rem;
    border-radius:4px;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text-dim);
    flex:1;
  }
  .settings-actions button:hover{ border-color:var(--accent); color:var(--accent); }
  .settings-actions button.danger:hover{ border-color:var(--danger); color:var(--danger); }
  .settings-panel .close-btn{
    position:absolute;
    top:.7rem;
    right:.8rem;
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:.85rem;
    padding:.1rem .25rem;
    line-height:1;
  }
  .settings-panel .close-btn:hover{ color:var(--accent); }

  /* dropbox sync */
  .dbx-status{
    font-size:.62rem;
    font-weight:500;
    padding:.12rem .5rem;
    border-radius:10px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text-dim);
    margin-left:.55rem;
    text-transform:none;
    letter-spacing:0;
  }
  .dbx-status.connected{ background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
  .dbx-link{ display:block; text-align:center; color:var(--accent); text-decoration:none; font-size:.72rem; }
  .dbx-link:hover{ text-decoration:underline; }
  .dbx-input{
    width:100%;
    font-family:inherit;
    font-size:.85rem;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:.45rem .6rem;
    border-radius:4px;
    margin-bottom:.6rem;
    box-sizing:border-box;
  }
  .dbx-input:focus{ outline:1px solid var(--accent); }
  .dbx-account-row{ font-size:.78rem; color:var(--text); margin:0 0 .9rem; }
  .dbx-account-row .dbx-last{ color:var(--text-dim); }
  .dbx-account-row .dbx-last::before{ content:' · '; opacity:.6; }
  label.dbx-toggle{
    display:flex;
    align-items:center;
    gap:.6rem;
    cursor:pointer;
    margin:0 0 .7rem;
    font-size:.8rem;
    color:var(--text);
    text-transform:none;
    letter-spacing:normal;
    user-select:none;
  }
  .dbx-toggle:last-of-type{ margin-bottom:1rem; }
  .dbx-toggle input{
    position:absolute;
    appearance:none;
    -webkit-appearance:none;
    width:1px; height:1px;
    margin:-1px;
    padding:0;
    border:0;
    opacity:0;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
  }
  .dbx-toggle-track{
    flex-shrink:0;
    width:36px;
    height:20px;
    border-radius:10px;
    background:var(--panel);
    border:1px solid var(--line);
    position:relative;
    transition:background .2s, border-color .2s;
  }
  .dbx-toggle-thumb{
    position:absolute;
    top:2px;
    left:2px;
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--text-dim);
    transition:transform .2s, background .2s;
  }
  .dbx-toggle input:checked + .dbx-toggle-track{ background:var(--accent-dim); border-color:var(--accent); }
  .dbx-toggle input:checked + .dbx-toggle-track .dbx-toggle-thumb{ transform:translateX(16px); background:var(--accent); }
  .dbx-toggle input:focus-visible + .dbx-toggle-track{ outline:1px solid var(--accent); outline-offset:1px; }
  #syncBtn .sync-ico{ display:inline-block; }
  #syncBtn.syncing .sync-ico{ animation:dbx-spin .8s linear infinite; }
  @keyframes dbx-spin{ to{ transform:rotate(360deg); } }

  .toast{
    position:fixed;
    left:50%;
    bottom:1.4rem;
    transform:translate(-50%, 12px);
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:.55rem 1rem;
    border-radius:4px;
    font-size:.82rem;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s, transform .2s;
    z-index:300;
    max-width:90vw;
    text-align:center;
  }
  .toast.show{ opacity:1; transform:translate(-50%, 0); }

  /* mobile */
  .mobile-back-btn{ display:none; }
  @media (max-width:760px){
    .topbar{ flex-wrap:wrap; row-gap:.3rem; }
    .topbar .spacer{ display:none; }
    .topbar::before{ content:''; order:1; flex:1; }
    #syncBtn, #changelogBtn, #settingsBtn{ order:1; }
    .search-wrap{ order:2; flex:1 1 100%; max-width:none; }

    .index-panel{ width:100%; }
    .editor-panel{ display:none; }
    .layout.show-editor .editor-panel{ display:flex; }
    .layout.show-editor .index-panel{ display:none; }

    .mobile-back-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }
    .editor-header{ flex-wrap:wrap; row-gap:.5rem; }
    .editor-header input[type="text"]{ min-width:0; }

    .entry .snippet{ max-width:60vw; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">minote</span>
  <span class="version" id="versionBadge"></span>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="search… (ctrl+k)">
    <button id="searchImgBtn" class="search-img">img</button>
    <button id="searchClearBtn" class="search-clear" hidden>✕</button>
  </div>
  <div class="spacer"></div>
  <button id="syncBtn" style="display:none"><span class="sync-ico">⟳</span> sync</button>
  <button id="changelogBtn">changelog</button>
  <button id="settingsBtn">settings</button>
</div>

<div class="layout" id="layout">
  <div class="index-panel">
    <div class="view-tabs">
      <button id="viewActive" class="active">notes</button>
      <button id="viewArchived">archived</button>
      <button id="viewTrashed">trash</button>
    </div>
    <div class="folders-section">
      <div class="folders-header">
        <span>folders</span>
        <button id="addFolderBtn" title="new folder">+</button>
      </div>
      <div id="foldersList"></div>
    </div>
    <div class="new-row"><button id="addBtn">+ new note</button></div>
    <div id="entries"></div>
  </div>
  <div class="editor-panel" id="editorPanel">
    <div class="no-selection">select a note, or create a new one</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
(() => {
  const APP_VERSION = 'x.x.x';
  const DB_NAME = 'minote-db';
  const STORE = 'notes';
  const FOLDER_STORE = 'folders';
  let db;

  function openDB(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 3);
      req.onupgradeneeded = (e) => {
        const d = req.result;
        if (!d.objectStoreNames.contains(STORE)){
          d.createObjectStore(STORE, { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains(FOLDER_STORE)){
          d.createObjectStore(FOLDER_STORE, { keyPath: 'id' });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function tx(mode){ return db.transaction(STORE, mode).objectStore(STORE); }

  function getAll(){
    return new Promise((resolve, reject) => {
      const req = tx('readonly').getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  function put(note){
    return new Promise((resolve, reject) => {
      const req = tx('readwrite').put(note);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
  function remove(id){
    return new Promise((resolve, reject) => {
      const req = tx('readwrite').delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
  function clearAll(){
    return new Promise((resolve, reject) => {
      const req = tx('readwrite').clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  function getAllFolders(){
    return new Promise((resolve, reject) => {
      const req = db.transaction(FOLDER_STORE, 'readonly').objectStore(FOLDER_STORE).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  function putFolder(folder){
    return new Promise((resolve, reject) => {
      const req = db.transaction(FOLDER_STORE, 'readwrite').objectStore(FOLDER_STORE).put(folder);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
  function removeFolder(id){
    return new Promise((resolve, reject) => {
      const req = db.transaction(FOLDER_STORE, 'readwrite').objectStore(FOLDER_STORE).delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
  function clearAllFolders(){
    return new Promise((resolve, reject) => {
      const req = db.transaction(FOLDER_STORE, 'readwrite').objectStore(FOLDER_STORE).clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  const entriesEl = document.getElementById('entries');
  const editorPanel = document.getElementById('editorPanel');
  const layoutEl = document.getElementById('layout');

  function updateMobileView(){
    layoutEl.classList.toggle('show-editor', !!activeId);
  }
  const search = document.getElementById('search');
  const searchClearBtn = document.getElementById('searchClearBtn');
  const searchImgBtn = document.getElementById('searchImgBtn');

  let notes = [];
  let folders = [];
  let activeId = null;
  let activeFolderId = null;
  let filter = '';
  let imageFilter = false;
  let view = 'active';

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }

  function fmtDate(ts){
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' }) +
           ' ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  }

  function renderFolders(){
    const list = document.getElementById('foldersList');
    list.innerHTML = '';

    const allItem = document.createElement('div');
    allItem.className = 'folder-item' + (!activeFolderId ? ' active' : '');
    const allName = document.createElement('span');
    allName.className = 'folder-name';
    allName.textContent = 'all notes';
    allItem.append(allName);
    allItem.addEventListener('click', () => {
      activeFolderId = null;
      renderFolders();
      renderIndex();
    });
    list.append(allItem);

    folders.forEach(f => {
      const item = document.createElement('div');
      item.className = 'folder-item' + (f.id === activeFolderId ? ' active' : '');

      const nameSpan = document.createElement('span');
      nameSpan.className = 'folder-name';
      nameSpan.textContent = f.name;
      nameSpan.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'folder-rename-input';
        input.value = f.name;
        const finish = () => {
          const val = input.value.trim();
          if (val && val !== f.name){
            f.name = val;
            putFolder(f);
            markDirty();
          }
          renderFolders();
        };
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter'){ e.preventDefault(); finish(); } else if (e.key === 'Escape'){ renderFolders(); } });
        input.addEventListener('blur', finish);
        nameSpan.replaceWith(input);
        input.focus();
        input.select();
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'folder-del';
      delBtn.textContent = '✕';
      delBtn.title = 'delete folder';
      delBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!await confirmDialog('Delete folder "' + f.name + '"? Notes will not be deleted.', true)) return;
        folders = folders.filter(x => x.id !== f.id);
        if (activeFolderId === f.id) activeFolderId = null;
        removeFolder(f.id).catch(err => console.error('failed to delete folder', err));
        notes.forEach(n => { if (n.folderId === f.id){ n.folderId = null; put(n).catch(err => console.error('failed to save note', err)); } });
        markDirty();
        renderFolders();
        renderIndex();
      });

      item.append(nameSpan, delBtn);
      item.addEventListener('click', () => {
        activeFolderId = f.id;
        renderFolders();
        renderIndex();
      });
      list.append(item);
    });
  }

  function visibleNotes(){
    const term = filter.trim().toLowerCase();
    return notes
      .filter(n => (n.status || 'active') === view)
      .filter(n => !activeFolderId || n.folderId === activeFolderId)
      .filter(n => !term || n.title.toLowerCase().includes(term) || n.body.toLowerCase().includes(term) || (n.tags || []).some(t => t.toLowerCase().includes(term)))
      .filter(n => !imageFilter || (n.images && n.images.length))
      .sort((a,b) => (b.pinned - a.pinned) || (b.updated - a.updated));
  }

  function renderIndex(){
    const list = visibleNotes();
    entriesEl.innerHTML = '';

    if (!list.length){
      const empty = document.createElement('div');
      empty.className = 'index-empty';
      empty.textContent = view === 'active' ? (notes.length ? 'no matches' : 'no notes yet') : view === 'archived' ? 'no archived notes' : 'trash is empty';
      entriesEl.append(empty);
      return;
    }

    list.forEach((n, i) => {
      const row = document.createElement('div');
      row.className = 'entry' + (n.id === activeId ? ' active' : '') + (n.pinned ? ' pinned' : '') + ((n.status === 'archived') ? ' archived' : '') + ((n.status === 'trashed') ? ' trashed' : '');

      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = String(i + 1).padStart(2, '0');

      const info = document.createElement('div');
      info.className = 'info';
      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = n.title || '(untitled)';
      const snippet = document.createElement('div');
      snippet.className = 'snippet';
      snippet.textContent = stripMarkdown(n.body).replace(/\s+/g, ' ').trim().slice(0, 60) || 'empty';
      info.append(title, snippet);

      if (n.tags && n.tags.length){
        const tagsRow = document.createElement('div');
        tagsRow.className = 'tags-row';
        n.tags.forEach(t => {
          const pill = document.createElement('span');
          pill.className = 'tag-pill';
          pill.textContent = t;
          tagsRow.append(pill);
        });
        info.append(tagsRow);
      }

      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '✕';
      del.title = 'delete note';
      del.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (view === 'trashed'){
          if (!await confirmDialog('Permanently delete this note?', true)) return;
          notes = notes.filter(x => x.id !== n.id);
          if (activeId === n.id) activeId = null;
          renderIndex();
          renderEditor();
          remove(n.id).catch(err => console.error('failed to delete note', err));
          markDirty();
        } else {
          if (!await confirmDialog('Move this note to trash?')) return;
          n.status = 'trashed';
          n.updated = Date.now();
          if (activeId === n.id) activeId = null;
          renderIndex();
          renderEditor();
          put(n).catch(err => console.error('failed to save note', err));
          markDirty();
        }
      });

      row.append(num, info, del);
      row.addEventListener('click', () => {
        activeId = n.id;
        renderIndex();
        renderEditor();
      });
      entriesEl.append(row);
    });
  }

  function renderEditor(){
    const n = notes.find(x => x.id === activeId);
    editorPanel.innerHTML = '';
    updateMobileView();

    if (!n){
      const empty = document.createElement('div');
      empty.className = 'no-selection';
      empty.textContent = notes.length ? 'select a note, or create a new one' : 'create a note to get started';
      editorPanel.append(empty);
      return;
    }

    const header = document.createElement('div');
    header.className = 'editor-header';

    const backBtn = document.createElement('button');
    backBtn.className = 'pin-toggle mobile-back-btn';
    backBtn.textContent = '←';
    backBtn.title = 'back to notes';
    backBtn.addEventListener('click', () => {
      activeId = null;
      renderIndex();
      renderEditor();
    });
    header.append(backBtn);

    const titleInput = document.createElement('input');
    titleInput.type = 'text';
    titleInput.placeholder = 'untitled note';
    titleInput.value = n.title;

    const pinBtn = document.createElement('button');
    pinBtn.className = 'pin-toggle' + (n.pinned ? ' on' : '');
    pinBtn.textContent = n.pinned ? 'pinned' : 'pin';
    pinBtn.addEventListener('click', () => {
      n.pinned = !n.pinned;
      n.updated = Date.now();
      renderIndex();
      renderEditor();
      put(n).catch(err => console.error('failed to save note', err));
      markDirty();
    });

    const folderSelect = document.createElement('select');
    folderSelect.className = 'folder-select';
    const noneOpt = document.createElement('option');
    noneOpt.value = '';
    noneOpt.textContent = 'no folder';
    folderSelect.append(noneOpt);
    folders.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.id;
      opt.textContent = f.name;
      if (f.id === n.folderId) opt.selected = true;
      folderSelect.append(opt);
    });
    folderSelect.addEventListener('change', () => {
      n.folderId = folderSelect.value || null;
      n.updated = Date.now();
      scheduleSave();
      renderIndex();
    });

    header.append(titleInput, folderSelect, pinBtn);

    if (n.status === 'trashed'){
      const restoreBtn = document.createElement('button');
      restoreBtn.className = 'pin-toggle';
      restoreBtn.textContent = '↩ restore';
      restoreBtn.addEventListener('click', () => {
        n.status = 'active';
        n.updated = Date.now();
        renderIndex();
        renderEditor();
        put(n).catch(err => console.error('failed to save note', err));
        markDirty();
      });
      header.append(restoreBtn);

      const delPermBtn = document.createElement('button');
      delPermBtn.className = 'pin-toggle';
      delPermBtn.style.color = 'var(--danger)';
      delPermBtn.textContent = '🗑 delete permanently';
      delPermBtn.addEventListener('click', async () => {
        if (!await confirmDialog('Permanently delete this note?', true)) return;
        notes = notes.filter(x => x.id !== n.id);
        activeId = null;
        renderIndex();
        renderEditor();
        remove(n.id).catch(err => console.error('failed to delete note', err));
        markDirty();
      });
      header.append(delPermBtn);
    } else {
      const archiveBtn = document.createElement('button');
      archiveBtn.className = 'pin-toggle' + (n.status === 'archived' ? ' on' : '');
      archiveBtn.textContent = n.status === 'archived' ? 'archived' : 'archive';
      archiveBtn.addEventListener('click', () => {
        n.status = n.status === 'archived' ? 'active' : 'archived';
        n.updated = Date.now();
        renderIndex();
        renderEditor();
        put(n).catch(err => console.error('failed to save note', err));
        markDirty();
      });
      header.append(archiveBtn);
    }

    const tagsRow = document.createElement('div');
    tagsRow.className = 'editor-tags';

    function renderTags(){
      tagsRow.innerHTML = '';
      (n.tags || []).forEach(t => {
        const pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.innerHTML = t + ' <span class="tag-del">✕</span>';
        pill.querySelector('.tag-del').addEventListener('click', (e) => {
          e.stopPropagation();
          n.tags = n.tags.filter(x => x !== t);
          renderTags();
          scheduleSave();
        });
        tagsRow.append(pill);
      });
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'tag-input';
      input.placeholder = 'add tag…';
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ','){
          e.preventDefault();
          const val = input.value.trim().toLowerCase();
          if (val && !n.tags.includes(val)){
            n.tags.push(val);
            input.value = '';
            renderTags();
            tagsRow.querySelector('.tag-input').focus();
            scheduleSave();
          }
        }
      });
      tagsRow.append(input);
    }
    renderTags();

    const meta = document.createElement('div');
    meta.className = 'editor-meta';
    meta.textContent = 'last edited ' + fmtDate(n.updated);

    const body = document.createElement('div');
    body.className = 'body';
    body.contentEditable = 'true';
    body.spellcheck = false;
    body.dataset.placeholder = 'write something…';
    body.innerHTML = renderBodyHTML(n.body);
    body.classList.toggle('is-empty', !n.body);

    function updateActiveLine(){
      const idx = n.body.slice(0, getCaretOffset(body)).split('\n').length - 1;
      const prev = body.querySelector('.lm-line-active');
      if (prev) prev.classList.remove('lm-line-active');
      const cur = body.querySelector('.lm-line[data-line="' + idx + '"]');
      if (cur) cur.classList.add('lm-line-active');
    }
    updateActiveLine();

    let debounce;
    function scheduleSave(){
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        n.updated = Date.now();
        meta.textContent = 'last edited ' + fmtDate(n.updated);
        renderIndex();
        put(n).catch(err => console.error('failed to save note', err));
        markDirty();
      }, 400);
    }
    titleInput.addEventListener('input', () => { n.title = titleInput.value; scheduleSave(); });
    titleInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); body.focus(); } });

    let composing = false;
    function applyBodyEdit(caretPos){
      body.innerHTML = renderBodyHTML(n.body);
      body.classList.toggle('is-empty', !n.body);
      setCaretOffset(body, caretPos);
      updateActiveLine();
      scheduleSave();
      slashUpdate();
    }
    function refreshBody(){
      applyBodyEdit(getCaretOffset(body));
    }
    function insertTextAtCaret(text){
      const pos = getCaretOffset(body);
      n.body = n.body.slice(0, pos) + text + n.body.slice(pos);
      applyBodyEdit(pos + text.length);
    }
    function handleEnterKey(){
      const pos = getCaretOffset(body);
      const lineStart = n.body.lastIndexOf('\n', pos - 1) + 1;
      let lineEnd = n.body.indexOf('\n', pos);
      if (lineEnd === -1) lineEnd = n.body.length;
      const lineText = n.body.slice(lineStart, lineEnd);

      const taskM = lineText.match(/^(\s*[-*]\s+)\[[ xX]\](\s+)(.*)$/);
      const ulM = !taskM && lineText.match(/^(\s*[-*]\s+)(.*)$/);
      const olM = !taskM && !ulM && lineText.match(/^(\s*)(\d+)(\.\s+)(.*)$/);

      let content = null;
      if (taskM) content = taskM[3];
      else if (ulM) content = ulM[2];
      else if (olM) content = olM[4];

      if (content !== null && content.trim() === ''){
        // empty list item: pressing Enter again clears the marker instead of continuing the list
        n.body = n.body.slice(0, lineStart) + n.body.slice(lineEnd);
        applyBodyEdit(lineStart);
        return;
      }

      let continuation = '';
      if (taskM) continuation = taskM[1] + '[ ]' + taskM[2];
      else if (ulM) continuation = ulM[1];
      else if (olM) continuation = olM[1] + (parseInt(olM[2], 10) + 1) + olM[3];
      insertTextAtCaret('\n' + continuation);
    }
    body.addEventListener('compositionstart', () => { composing = true; });
    body.addEventListener('compositionend', () => { composing = false; n.body = nodeToPlainText(body); refreshBody(); });
    body.addEventListener('keyup', updateActiveLine);
    body.addEventListener('mouseup', updateActiveLine);
    body.addEventListener('focus', updateActiveLine);
    body.addEventListener('input', () => {
      n.body = nodeToPlainText(body);
      if (composing){ scheduleSave(); return; }
      refreshBody();
    });

    /* slash command menu */
    const SLASH_ITEMS = [
      { label:'heading 1', icon:'#', hint:'# ', insert:'# $' },
      { label:'heading 2', icon:'##', hint:'## ', insert:'## $' },
      { label:'heading 3', icon:'###', hint:'### ', insert:'### $' },
      { label:'bold', icon:'B', hint:'**b**', insert:'**$**' },
      { label:'italic', icon:'i', hint:'*i*', insert:'*$*' },
      { label:'strikethrough', icon:'S', hint:'~~s~~', insert:'~~$~~' },
      { label:'inline code', icon:'`', hint:'`c`', insert:'`$`' },
      { label:'code block', icon:'{}', hint:'```', insert:'```\n$\n```' },
      { label:'bullet list', icon:'•', hint:'- ', insert:'- $' },
      { label:'numbered list', icon:'1.', hint:'1. ', insert:'1. $' },
      { label:'task list', icon:'☐', hint:'- [ ]', insert:'- [ ] $' },
      { label:'quote', icon:'❝', hint:'> ', insert:'> $' },
      { label:'divider', icon:'—', hint:'---', insert:'---\n$' },
      { label:'link', icon:'↗', hint:'[]()', insert:'[$](https://)' },
    ];
    let slashMenu = null, slashSel = 0, slashStart = -1;

    function slashClose(){
      if (slashMenu){ slashMenu.remove(); slashMenu = null; }
      slashStart = -1;
    }

    function slashMatches(){
      const q = n.body.slice(slashStart + 1, getCaretOffset(body)).toLowerCase();
      return SLASH_ITEMS.filter(it => it.label.replace(/\s/g, '').includes(q.replace(/\s/g, '')));
    }

    function slashInsert(item){
      const pos = getCaretOffset(body);
      const before = n.body.slice(0, slashStart);
      const after = n.body.slice(pos);
      const caretMark = item.insert.indexOf('$');
      const snippet = item.insert.replace('$', '');
      n.body = before + snippet + after;
      body.innerHTML = renderBodyHTML(n.body);
      body.classList.toggle('is-empty', !n.body);
      setCaretOffset(body, before.length + caretMark);
      updateActiveLine();
      slashClose();
      body.focus();
      scheduleSave();
    }

    function slashRender(){
      const items = slashMatches();
      slashMenu.innerHTML = '';
      if (!items.length){
        const empty = document.createElement('div');
        empty.className = 'slash-empty';
        empty.textContent = 'no matches';
        slashMenu.append(empty);
        return;
      }
      if (slashSel >= items.length) slashSel = items.length - 1;
      items.forEach((it, i) => {
        const row = document.createElement('div');
        row.className = 'slash-item' + (i === slashSel ? ' active' : '');
        row.innerHTML = `<span class="slash-icon">${it.icon}</span>${it.label}<span class="slash-hint">${it.hint}</span>`;
        row.addEventListener('mousedown', (e) => { e.preventDefault(); slashInsert(it); });
        row.addEventListener('mousemove', () => { if (slashSel !== i){ slashSel = i; slashRender(); } });
        slashMenu.append(row);
      });
      const active = slashMenu.querySelector('.slash-item.active');
      if (active) active.scrollIntoView({ block:'nearest' });
    }

    function caretCoords(){
      const sel = window.getSelection();
      if (!sel.rangeCount || !body.contains(sel.getRangeAt(0).startContainer)) return { top:0, left:0 };
      const range = sel.getRangeAt(0).cloneRange();
      range.collapse(true);
      const rect = range.getBoundingClientRect();
      const panelRect = editorPanel.getBoundingClientRect();
      return { top: rect.top - panelRect.top, bottom: rect.bottom - panelRect.top, left: rect.left - panelRect.left };
    }

    function slashOpen(){
      slashStart = getCaretOffset(body) - 1;
      slashSel = 0;
      slashMenu = document.createElement('div');
      slashMenu.className = 'slash-menu';
      const c = caretCoords();
      const panelRect = editorPanel.getBoundingClientRect();
      let top = c.bottom + 4;
      let left = Math.min(c.left, panelRect.width - 240);
      slashMenu.style.top = top + 'px';
      slashMenu.style.left = Math.max(8, left) + 'px';
      editorPanel.append(slashMenu);
      slashRender();
      // flip above the caret if the menu would overflow the panel bottom
      const mh = slashMenu.offsetHeight;
      if (top + mh > panelRect.height - 8){
        slashMenu.style.top = Math.max(8, c.top - mh - 6) + 'px';
      }
    }

    function slashUpdate(){
      const pos = getCaretOffset(body);
      const before = n.body.slice(0, pos);
      if (slashMenu){
        // close if the "/" was deleted or we moved past a space / newline
        const seg = n.body.slice(slashStart, pos);
        if (slashStart >= n.body.length || n.body[slashStart] !== '/' || pos <= slashStart || /[\s]/.test(seg.slice(1))){
          slashClose();
        } else {
          slashRender();
          return;
        }
      }
      // open when "/" was just typed at line start or after whitespace
      if (before.endsWith('/')){
        const prev = before[before.length - 2];
        if (prev === undefined || prev === '\n' || prev === ' ' || prev === '\t'){
          slashOpen();
        }
      }
    }

    body.addEventListener('keydown', (e) => {
      if (slashMenu){
        const items = slashMatches();
        if (e.key === 'ArrowDown'){ e.preventDefault(); slashSel = Math.min(slashSel + 1, items.length - 1); slashRender(); return; }
        if (e.key === 'ArrowUp'){ e.preventDefault(); slashSel = Math.max(slashSel - 1, 0); slashRender(); return; }
        if (e.key === 'Enter' || e.key === 'Tab'){ if (items.length){ e.preventDefault(); slashInsert(items[slashSel]); } else slashClose(); return; }
        if (e.key === 'Escape'){ e.preventDefault(); slashClose(); return; }
      }
      if (e.key === 'Enter'){ e.preventDefault(); handleEnterKey(); }
    });
    body.addEventListener('blur', () => setTimeout(slashClose, 150));
    body.addEventListener('click', () => { if (slashMenu) slashUpdate(); });

    const imagesContainer = document.createElement('div');
    imagesContainer.className = 'images-container';

    function renderImages(){
      imagesContainer.innerHTML = '';
      (n.images || []).forEach(img => {
        const wrap = document.createElement('div');
        wrap.className = 'image-wrap';
        const imgEl = document.createElement('img');
        imgEl.src = img.dataUrl;
        imgEl.style.cursor = 'pointer';
        imgEl.addEventListener('click', () => {
          const ov = document.createElement('div');
          ov.className = 'overlay';
          ov.style.cursor = 'zoom-out';
          ov.innerHTML = `<img src="${img.dataUrl}" style="max-width:90vw;max-height:90vh;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.5)">`;
          ov.addEventListener('click', () => ov.remove());
          document.body.append(ov);
        });
        const del = document.createElement('button');
        del.className = 'image-del';
        del.textContent = '✕';
        del.addEventListener('click', () => {
          n.images = n.images.filter(x => x.id !== img.id);
          renderImages();
          scheduleSave();
        });
        wrap.append(imgEl, del);
        imagesContainer.append(wrap);
      });
    }
    renderImages();

    body.addEventListener('paste', (e) => {
      const items = e.clipboardData.items;
      let hasImage = false;
      for (const item of items){
        if (item.type.startsWith('image/')){
          hasImage = true;
          e.preventDefault();
          const file = item.getAsFile();
          if (!file) continue;
          const reader = new FileReader();
          reader.onload = () => {
            if (!n.images) n.images = [];
            n.images.push({ id: uid(), dataUrl: reader.result });
            renderImages();
            scheduleSave();
          };
          reader.readAsDataURL(file);
        }
      }
      if (!hasImage){
        e.preventDefault();
        insertTextAtCaret(e.clipboardData.getData('text/plain'));
      }
    });

    editorPanel.append(header, tagsRow, meta, body, imagesContainer);
    body.focus();
  }

  /* ---------- tiny markdown renderer (no external deps) ---------- */
  function mdEscape(s){
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function stripMarkdown(text){
    return text
      .replace(/```[\s\S]*?```/g, ' ')
      .split('\n')
      .map(line => line
        .replace(/^\s*#{1,6}\s+/, '')
        .replace(/^\s*>\s?/, '')
        .replace(/^\s*[-*]\s+\[[ xX]\]\s+/, '')
        .replace(/^\s*[-*]\s+/, '')
        .replace(/^\s*\d+\.\s+/, '')
        .replace(/^\s*(---+|\*\*\*+)\s*$/, ''))
      .join(' ')
      .replace(/\*\*\*([^*]+)\*\*\*/g, '$1')
      .replace(/\*\*([^*]+)\*\*/g, '$1')
      .replace(/\*([^*]+)\*/g, '$1')
      .replace(/~~([^~]+)~~/g, '$1')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/\[([^\]]+)\]\([^)\s]+\)/g, '$1');
  }

  /* ---------- live inline markdown rendering (WYSIWYG-ish note body) ---------- */
  function lmInline(s){
    const store = [];
    const put = (html) => { store.push(html); return '\x00' + (store.length - 1) + '\x00'; };
    s = s.replace(/`([^`]+)`/g, (m, c) =>
      put('<span class="lm-mark">`</span><code>' + c + '</code><span class="lm-mark">`</span>'));
    s = s.replace(/\*\*\*([^*]+)\*\*\*/g, (m, c) =>
      put('<span class="lm-mark">***</span><strong><em>' + c + '</em></strong><span class="lm-mark">***</span>'));
    s = s.replace(/\*\*([^*]+)\*\*/g, (m, c) =>
      put('<span class="lm-mark">**</span><strong>' + c + '</strong><span class="lm-mark">**</span>'));
    s = s.replace(/\*([^*]+)\*/g, (m, c) =>
      put('<span class="lm-mark">*</span><em>' + c + '</em><span class="lm-mark">*</span>'));
    s = s.replace(/~~([^~]+)~~/g, (m, c) =>
      put('<span class="lm-mark">~~</span><del>' + c + '</del><span class="lm-mark">~~</span>'));
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, label, url) =>
      /^https?:\/\//i.test(url)
        ? put(`<span class="lm-mark">[</span>${label}<span class="lm-mark">](<a href="${url}" target="_blank" rel="noopener">${url}</a>)</span>`)
        : m);
    return s.replace(/\x00(\d+)\x00/g, (m, i) => store[+i]);
  }

  function lmRenderLine(line, state){
    const fence = line.trim().match(/^```/);
    if (fence){
      state.inCode = !state.inCode;
      return '<span class="lm-code-block lm-fence"><span class="lm-mark">' + line + '</span></span>';
    }
    if (state.inCode) return '<span class="lm-code-block">' + (line || '​') + '</span>';

    const h = line.match(/^(#{1,6})(\s+)(.*)/);
    if (h) return `<span class="lm-mark">${h[1]}${h[2]}</span><span class="lm-h${h[1].length}">${lmInline(h[3])}</span>`;

    if (/^\s*(---+|\*\*\*+)\s*$/.test(line)) return '<span class="lm-hr"><span class="lm-mark">' + line + '</span></span>';

    const q = line.match(/^(&gt;\s?)(.*)/);
    if (q) return `<span class="lm-quote"><span class="lm-mark">${q[1]}</span>${lmInline(q[2])}</span>`;

    const task = line.match(/^(\s*[-*]\s+)(\[)([ xX])(\]\s+)(.*)/);
    if (task){
      const checked = task[3] !== ' ';
      return `<span class="lm-mark">${task[1]}${task[2]}${task[3]}${task[4]}</span><span class="lm-task-box${checked ? ' lm-task-checked' : ''}"></span>${lmInline(task[5])}`;
    }

    const ul = line.match(/^(\s*[-*]\s+)(.*)/);
    if (ul) return `<span class="lm-mark">${ul[1]}</span><span class="lm-bullet"></span>${lmInline(ul[2])}`;

    const ol = line.match(/^(\s*)(\d+\.\s+)(.*)/);
    if (ol) return `${ol[1]}<span class="lm-ol-mark">${ol[2]}</span>${lmInline(ol[3])}`;

    if (!line.trim()) return '';
    return lmInline(line);
  }

  function renderBodyHTML(text){
    const state = { inCode: false };
    return mdEscape(text).split('\n')
      .map((line, i) => `<span class="lm-line" data-line="${i}">${lmRenderLine(line, state)}</span>`)
      .join('<br>');
  }

  /* ---------- contenteditable plain-text <-> caret offset helpers ---------- */
  function nodeToPlainText(root){
    let out = '';
    const walk = (node) => {
      if (node.nodeType === Node.TEXT_NODE){ out += node.nodeValue; return; }
      if (node.nodeType !== Node.ELEMENT_NODE) return;
      if (node.tagName === 'BR'){ out += '\n'; return; }
      node.childNodes.forEach(walk);
    };
    root.childNodes.forEach(walk);
    return out.replace(/​/g, '');
  }

  function getCaretOffset(el){
    const sel = window.getSelection();
    if (!sel.rangeCount) return 0;
    const range = sel.getRangeAt(0);
    if (!el.contains(range.startContainer)) return 0;
    const pre = range.cloneRange();
    pre.selectNodeContents(el);
    pre.setEnd(range.startContainer, range.startOffset);
    return nodeToPlainText(pre.cloneContents()).length;
  }

  function setCaretOffset(el, offset){
    let remaining = offset, result = null;
    const walk = (node) => {
      if (result) return;
      if (node.nodeType === Node.TEXT_NODE){
        const len = node.nodeValue.length;
        if (remaining <= len){ result = { node, offset: remaining }; return; }
        remaining -= len;
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;
      if (node.tagName === 'BR'){
        if (remaining <= 0){ result = { node: node.parentNode, offset: Array.prototype.indexOf.call(node.parentNode.childNodes, node) }; return; }
        remaining -= 1;
        return;
      }
      if (!node.hasChildNodes()){
        // an empty inline element (e.g. a blank line's wrapper span) contributes no characters.
        // Browsers normalize a collapsed selection away from a truly empty element (snapping
        // back to the nearest real content), so give it a real zero-width text child to anchor to.
        if (remaining <= 0){
          const anchor = document.createTextNode('​');
          node.appendChild(anchor);
          result = { node: anchor, offset: 1 };
        }
        return;
      }
      node.childNodes.forEach(walk);
    };
    el.childNodes.forEach(walk);
    if (!result) result = { node: el, offset: el.childNodes.length };
    const range = document.createRange();
    range.setStart(result.node, result.offset);
    range.collapse(true);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2400);
  }

  /* ---------- Dropbox sync (client-side OAuth2 PKCE, no backend) ---------- */
  const DBX_KEY = 'minote.dropbox';
  const DBX_PATH = '/minote-backup.json';
  let dbx = JSON.parse(localStorage.getItem(DBX_KEY) || 'null') ||
    { appKey: '', accessToken: '', refreshToken: '', expiresAt: 0, account: '', lastSync: '', lastSyncAt: 0, dismissedRemoteAt: 0, autoSync: false, autoUpload: false };
  const dbxSave = () => localStorage.setItem(DBX_KEY, JSON.stringify(dbx));
  const dbxRedirectUri = () => location.origin + location.pathname;

  let _syncTimer = null, _skipAutoUpload = false, _lastUploadedState = '', _syncing = 0;
  function markDirty(){ scheduleAutoUpload(); }
  function scheduleAutoUpload(){
    if (!dbx.accessToken || !dbx.autoUpload) return;
    if (_skipAutoUpload){ _skipAutoUpload = false; return; }
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => dropboxUpload(true), 10000);
  }
  function setSyncing(on){
    _syncing += on ? 1 : -1;
    const btn = document.getElementById('syncBtn');
    if (btn) btn.classList.toggle('syncing', _syncing > 0);
  }

  function b64url(buf){
    return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  function randomString(len){
    const a = new Uint8Array(len); crypto.getRandomValues(a); return b64url(a).slice(0, len);
  }
  async function pkceChallenge(verifier){
    const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
    return b64url(digest);
  }

  async function dropboxConnect(){
    const key = document.getElementById('dbxKey').value.trim();
    if (!key){ toast('Enter your Dropbox App key first'); return; }
    if (!isSecureContext){ toast('⚠ Dropbox sync needs HTTPS (or localhost)'); return; }
    dbx.appKey = key; dbxSave();
    const verifier = randomString(64);
    sessionStorage.setItem('minote.dbx.verifier', verifier);
    const challenge = await pkceChallenge(verifier);
    location.href = 'https://www.dropbox.com/oauth2/authorize?' + new URLSearchParams({
      client_id: key, response_type: 'code', code_challenge: challenge, code_challenge_method: 'S256',
      token_access_type: 'offline', redirect_uri: dbxRedirectUri()
    });
  }

  async function dropboxHandleRedirect(){
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    if (!code) return;
    history.replaceState(null, '', location.pathname + location.hash);
    const verifier = sessionStorage.getItem('minote.dbx.verifier');
    if (!verifier || !dbx.appKey) return;
    try {
      const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ code, grant_type: 'authorization_code', client_id: dbx.appKey, code_verifier: verifier, redirect_uri: dbxRedirectUri() })
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.error_description || j.error || 'auth failed');
      dbx.accessToken = j.access_token; dbx.refreshToken = j.refresh_token || dbx.refreshToken;
      dbx.expiresAt = Date.now() + (j.expires_in || 14400) * 1000; dbxSave();
      await dropboxFetchAccount();
      toast('Dropbox connected');
      dropboxCheckForUpdates();
    } catch (err) { toast('⚠ Dropbox connection failed: ' + err.message); }
    updateDropboxUI();
  }

  async function dropboxRefreshIfNeeded(){
    if (dbx.accessToken && Date.now() < dbx.expiresAt - 30000) return true;
    if (!dbx.refreshToken || !dbx.appKey) return !!dbx.accessToken;
    const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
      method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: dbx.refreshToken, client_id: dbx.appKey })
    });
    const j = await res.json();
    if (!res.ok) return false;
    dbx.accessToken = j.access_token; dbx.expiresAt = Date.now() + (j.expires_in || 14400) * 1000; dbxSave();
    return true;
  }

  async function dropboxFetchAccount(){
    try {
      const res = await fetch('https://api.dropboxapi.com/2/users/get_current_account', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + dbx.accessToken }
      });
      if (res.ok){ const j = await res.json(); dbx.account = j.email || (j.name && j.name.display_name) || ''; dbxSave(); }
    } catch (e){}
  }

  function dbxParseBackup(text){
    const parsed = JSON.parse(text);
    if (Array.isArray(parsed)) return { notes: parsed, folders: [] }; // old export format: raw notes array
    const d = parsed && parsed.data ? parsed.data : parsed;
    if (!d || !Array.isArray(d.notes)) throw new Error('bad backup format');
    return d;
  }

  async function dbxApplyData(d){
    await clearAll();
    await clearAllFolders();
    notes = d.notes || [];
    folders = d.folders || [];
    notes.forEach(n => {
      if (n.body === undefined) n.body = n.text || '';
      if (n.title === undefined) n.title = '';
      if (n.tags === undefined) n.tags = [];
      if (n.images === undefined) n.images = [];
      if (n.folderId === undefined) n.folderId = null;
      if (n.status === undefined) n.status = 'active';
    });
    for (const n of notes) await put(n);
    for (const f of folders) await putFolder(f);
    activeId = null;
    _lastUploadedState = JSON.stringify({ notes, folders });
    _skipAutoUpload = true;
    renderFolders(); renderIndex(); renderEditor();
  }

  async function dropboxUpload(silent){
    if (!await dropboxRefreshIfNeeded()){ if (!silent) toast('⚠ Dropbox session expired — reconnect'); return; }
    const snapshot = JSON.stringify({ notes, folders });
    if (silent && snapshot === _lastUploadedState) return;
    const payload = { app: 'minote', version: 1, exportedAt: new Date().toISOString(), data: { notes, folders } };
    setSyncing(true);
    try {
      const res = await fetch('https://content.dropboxapi.com/2/files/upload', {
        method: 'POST', headers: {
          'Authorization': 'Bearer ' + dbx.accessToken, 'Content-Type': 'application/octet-stream',
          'Dropbox-API-Arg': JSON.stringify({ path: DBX_PATH, mode: 'overwrite', mute: true })
        }, body: JSON.stringify(payload, null, 2)
      });
      if (!res.ok) throw new Error('upload failed (' + res.status + ')');
      _lastUploadedState = snapshot;
      dbx.lastSync = new Date().toLocaleString(); dbx.lastSyncAt = Date.now(); dbxSave(); updateDropboxUI();
      toast(silent ? 'Auto-synced to Dropbox' : 'Uploaded to Dropbox');
    } catch (err) { toast('⚠ ' + err.message); }
    finally { setSyncing(false); }
  }

  async function dropboxDownload(skipConfirm){
    if (!await dropboxRefreshIfNeeded()){ toast('⚠ Dropbox session expired — reconnect'); return; }
    try {
      const res = await fetch('https://content.dropboxapi.com/2/files/download', {
        method: 'POST', headers: {
          'Authorization': 'Bearer ' + dbx.accessToken,
          'Dropbox-API-Arg': JSON.stringify({ path: DBX_PATH })
        }
      });
      if (res.status === 409){ toast('No backup in Dropbox yet — upload one first'); return; }
      if (!res.ok) throw new Error('download failed (' + res.status + ')');
      const d = dbxParseBackup(await res.text());
      if (!skipConfirm && !await confirmDialog('Download from Dropbox? It will replace all your current notes and folders.', true)) return;
      await dbxApplyData(d);
      dbx.lastSync = new Date().toLocaleString(); dbx.lastSyncAt = Date.now(); dbxSave(); updateDropboxUI();
      toast('Synced from Dropbox');
    } catch (err) { toast('⚠ ' + (err.message === 'bad backup format' ? "Dropbox file isn't a minote backup" : err.message)); }
  }

  async function dropboxDisconnect(){
    if (!await confirmDialog('Disconnect Dropbox? You can reconnect any time with your App key.', true)) return;
    dbx = { appKey: dbx.appKey, accessToken: '', refreshToken: '', expiresAt: 0, account: '', lastSync: '', lastSyncAt: 0, dismissedRemoteAt: 0, autoSync: false, autoUpload: false };
    dbxSave(); updateDropboxUI(); toast('Dropbox disconnected');
  }

  function dropboxSetAutoUpload(on){
    dbx.autoUpload = !!on; dbxSave();
    toast(on ? 'Auto-upload enabled' : 'Auto-upload disabled');
    if (!on) clearTimeout(_syncTimer);
  }

  function dropboxSetAutoSync(on){
    dbx.autoSync = !!on; dbxSave();
    toast(on ? 'Auto-sync on launch enabled' : 'Auto-sync on launch disabled');
    if (on) dropboxCheckForUpdates();
  }

  async function dropboxCheckForUpdates(){
    if (!dbx.accessToken) return;
    if (!await dropboxRefreshIfNeeded()) return;
    try {
      const res = await fetch('https://api.dropboxapi.com/2/files/get_metadata', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + dbx.accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: DBX_PATH })
      });
      if (!res.ok) return;
      const j = await res.json();
      const remoteAt = Date.parse(j.server_modified || '');
      if (!remoteAt) return;
      if (remoteAt > (dbx.lastSyncAt || 0) + 5000 && remoteAt !== dbx.dismissedRemoteAt){
        if (dbx.autoSync) dropboxDownload(true);
        else openDbxSyncPrompt(remoteAt);
      }
    } catch (e) {}
  }

  function openDbxSyncPrompt(remoteAt){
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<div class="dialog"><p>Newer backup found on Dropbox (${new Date(remoteAt).toLocaleString()}). Download it now? This replaces the notes on this device.</p><div class="buttons">
      <button class="later">not now</button>
      <button class="primary now">⬇ sync now</button>
    </div></div>`;
    const dismiss = () => { dbx.dismissedRemoteAt = remoteAt; dbxSave(); overlay.remove(); };
    overlay.querySelector('.later').addEventListener('click', dismiss);
    overlay.querySelector('.now').addEventListener('click', () => { dropboxDownload(true); overlay.remove(); });
    overlay.addEventListener('click', (e) => { if (e.target === overlay) dismiss(); });
    document.body.append(overlay);
  }

  function updateDropboxUI(root){
    root = root || document;
    const setup = root.querySelector('#dbxSetup'), connected = root.querySelector('#dbxConnected'), st = root.querySelector('#dbxStatus');
    const isConnected = !!dbx.accessToken;
    if (setup){
      root.querySelector('#dbxKey').value = dbx.appKey || '';
      setup.style.display = isConnected ? 'none' : 'block';
      connected.style.display = isConnected ? 'block' : 'none';
      root.querySelector('#dbxAccount').textContent = dbx.account ? 'Connected as ' + dbx.account : 'Connected';
      root.querySelector('#dbxLastSync').textContent = dbx.lastSync ? 'last synced ' + dbx.lastSync : 'never synced';
      root.querySelector('#dbxAutoUpload').checked = !!dbx.autoUpload;
      root.querySelector('#dbxAutoSync').checked = !!dbx.autoSync;
      st.textContent = isConnected ? 'connected' : 'not connected';
      st.classList.toggle('connected', isConnected);
    }
    const syncBtn = document.getElementById('syncBtn');
    if (syncBtn) syncBtn.style.display = isConnected ? 'inline-block' : 'none';
  }

  document.getElementById('syncBtn').addEventListener('click', () => dropboxUpload(false));

  function confirmDialog(msg, danger=false){
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `<div class="dialog"><p>${msg}</p><div class="buttons">
        <button class="cancel" autofocus>cancel</button>
        <button class="${danger ? 'danger' : 'primary'}">ok</button>
      </div></div>`;
      overlay.querySelector('.cancel').addEventListener('click', () => { overlay.remove(); resolve(false); });
      overlay.querySelector('.buttons button:last-child').addEventListener('click', () => { overlay.remove(); resolve(true); });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } });
      document.body.append(overlay);
    });
  }

  search.addEventListener('input', () => {
    filter = search.value;
    searchClearBtn.hidden = !search.value;
    renderIndex();
  });

  searchClearBtn.addEventListener('click', () => {
    search.value = '';
    filter = '';
    imageFilter = false;
    searchImgBtn.classList.remove('active');
    searchClearBtn.hidden = true;
    search.focus();
    renderIndex();
  });

  searchImgBtn.addEventListener('click', () => {
    imageFilter = !imageFilter;
    searchImgBtn.classList.toggle('active', imageFilter);
    renderIndex();
  });

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k'){
      e.preventDefault();
      search.focus();
      search.select();
    }
  });

  try {
    const saved = JSON.parse(localStorage.getItem('minote-accent'));
    if (saved && saved.main && saved.dim){
      applyAccent(saved.main, saved.dim);
    }
  } catch(e){}
  try {
    const theme = localStorage.getItem('minote-theme');
    if (theme === 'light') setTheme(false);
  } catch(e){}

  (async () => {
    try{
      db = await openDB();
      notes = await getAll();
      folders = await getAllFolders();
      notes.forEach(n => { if (n.body === undefined) n.body = n.text || ''; if (n.title === undefined) n.title = ''; if (n.tags === undefined) n.tags = []; if (n.images === undefined) n.images = []; if (n.folderId === undefined) n.folderId = null; if (n.status === undefined) n.status = 'active'; });
    } catch (err){
      console.error('IndexedDB unavailable, notes will not persist between reloads', err);
      notes = [];
      folders = [];
    }
    renderFolders();
    renderIndex();
    renderEditor();
    _lastUploadedState = JSON.stringify({ notes, folders });
    updateDropboxUI();
    dropboxHandleRedirect();
    dropboxCheckForUpdates();
    checkVersionUpdate();
  })();

  /* ---------- version change notification ---------- */
  document.getElementById('versionBadge').textContent = APP_VERSION;
  function checkVersionUpdate(){
    const prev = localStorage.getItem('minote-version');
    if (prev === APP_VERSION) return;
    localStorage.setItem('minote-version', APP_VERSION);
    if (!prev) return; // first visit — nothing is "new" yet
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<div class="dialog"><p>✨ minote was updated to <b>${APP_VERSION}</b>.<br>Check the changelog to see what's changed.</p><div class="buttons">
      <button class="primary">got it</button>
      <button class="whats-new">what's new</button>
    </div></div>`;
    overlay.querySelector('.primary').addEventListener('click', () => overlay.remove());
    overlay.querySelector('.whats-new').addEventListener('click', () => {
      overlay.remove();
      document.getElementById('changelogBtn').click();
    });
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    document.body.append(overlay);
  }

  if ('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
